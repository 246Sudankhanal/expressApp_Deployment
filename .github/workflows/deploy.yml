name: Build and Push Docker Image

on:
  push:
    branches:
      - main  #Runs every time i push or merge code

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: set up docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker Image
        uses: docker/build-push-action@v5
        with: 
          context: .
          file: ./dockerfile
          push: true
          no-cache: true
          tags: |
            sudankhanal/firstdeployment:latest
            sudankhanal/firstdeployment:${{ github.sha }}

  
  deploy-to-server:
    needs: build-and-push   # Runs ONLY after build-and-push succeeds!
    runs-on: ubuntu-latest

    steps:
      - name: SSH into server and update deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ec2-user/expressApp_Deployment
            git pull origin main
            docker compose pull
            docker compose up -d --force-recreate
    

       